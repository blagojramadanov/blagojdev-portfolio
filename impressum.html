<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { background: #050a07; }
      #page-loader {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #050a07;
        transition: opacity 0.4s ease;
      }
      #page-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #page-loader .loader-ring {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid rgba(77, 255, 143, 0.18);
        border-top-color: #4dff8f;
        animation: loader-spin 0.8s linear infinite;
      }
      #page-loader .loader-text {
        font-family: "Share Tech Mono", ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.3em;
        color: rgba(200, 255, 217, 0.65);
      }
      #page-loader .loader-cursor {
        animation: loader-blink 1.1s step-end infinite;
      }
      @keyframes loader-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes loader-blink {
        50% { opacity: 0; }
      }
    </style>
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <title data-i18n="impressum.meta.title">Impressum — Blagoj Ramadanov</title>
  </head>
  <body class="crt-frame bg-crt-bg text-crt-ink font-mono antialiased min-h-screen flex flex-col">
    <div id="page-loader" role="status" aria-label="Loading">
      <div class="loader-ring" aria-hidden="true"></div>
      <span class="loader-text">LOADING<span class="loader-cursor">_</span></span>
    </div>
    <header class="bg-crt-bg/80 backdrop-blur border-b border-crt-green/15">
      <div class="container mx-auto px-6 h-16 flex items-center justify-between">
        <a href="./index.html" class="flex items-center gap-2 text-crt-ink/70 hover:text-crt-green transition w-fit">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
          <span class="tracking-wide">[ <span data-i18n="impressum.back">Back</span> ]</span>
        </a>
        <button
          id="lang-toggle"
          type="button"
          class="inline-flex items-center gap-1.5 rounded-md border border-crt-green/30 px-2.5 py-1 text-xs tracking-widest hover:border-crt-green transition"
          aria-label="Toggle language"
        >
          <span data-lang-en class="text-crt-green">EN</span>
          <span class="text-crt-green/30">/</span>
          <span data-lang-de class="text-crt-ink/40">DE</span>
        </button>
      </div>
    </header>

    <div class="flex-1 container mx-auto px-6">
      <div class="terminal-window max-w-2xl mx-auto mt-16 lg:mt-20 p-8 lg:p-10 text-center">
        <div class="flex items-center gap-1.5 mb-6">
          <span class="h-2.5 w-2.5 rounded-full bg-red-500/70"></span>
          <span class="h-2.5 w-2.5 rounded-full bg-crt-amber/70"></span>
          <span class="h-2.5 w-2.5 rounded-full bg-crt-green/70"></span>
        </div>
        <h2 class="font-display text-4xl lg:text-5xl tracking-wide text-crt-green text-glow">Impressum</h2>

        <h3 class="text-xl lg:text-2xl font-bold mt-10 text-crt-ink">Angaben gemäß § 5 TMG</h3>
        <p class="mt-3 text-crt-ink/80">Blagoj Ramadanov</p>
        <p class="text-crt-ink/50 text-sm mt-1" data-i18n="impressum.addressNote">(full address available on request)</p>

        <h3 class="text-xl lg:text-2xl font-bold mt-8 text-crt-ink" data-i18n="impressum.contact">Kontakt</h3>
        <p class="mt-3 text-crt-ink/80"><span data-i18n="impressum.emailLabel">E-Mail:</span> <a href="mailto:blaze.ramadanov@gmail.com" class="text-crt-green hover:text-glow">blaze.ramadanov@gmail.com</a></p>
      </div>
    </div>

    <div class="border-t border-crt-green/15 px-6 text-center mt-24 py-5 text-crt-ink/50 text-sm tracking-wide">
      <a href="./impressum.html" class="mr-4 hover:text-crt-green transition" data-i18n="footer.impressum">Impressum</a>
      <span>&copy; <span id="year"></span> Blagoj Ramadanov</span>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
